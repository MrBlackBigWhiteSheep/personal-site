baseURL = "https://mrblackbigwhitesheep.github.io/"
locale = "zh-CN"
title = "MrBlackBigWhiteSheep | Personal Site"
theme = "hugo-PaperMod"

# Enable dark mode
[params]
  defaultTheme = "auto"
  HomeInfoMode = true
  showtoc = true
  tocOpen = false
  siteDescription = "Personal website for PhD learning notes, projects, and knowledge management"

[params.homeInfoParams]
  Title = "MrBlackBigWhiteSheep"
  Content = "PhD candidate passionate about ML/NLP. Learning in public, one paper at a time."

# Social links
[[params.socialIcons]]
  name = "Github"
  url = "https://github.com/MrBlackBigWhiteSheep"

[[params.socialIcons]]
  name = "Mail"
  url = "mailto:your@email.com"

# Menu
[[menu.main]]
  identifier = "posts"
  name = "Posts"
  url = "/posts/"
  weight = 1

[[menu.main]]
  identifier = "projects"
  name = "Projects"
  url = "/projects/"
  weight = 2

[[menu.main]]
  identifier = "notes"
  name = "Notes"
  url = "/notes/"
  weight = 3

[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 4

# Build
buildDrafts = false
buildFuture = false

# Permalinks
[permalinks]
  posts = "/posts/:year/:slug/"
  projects = "/projects/:slug/"
  notes = "/notes/:slug/"
